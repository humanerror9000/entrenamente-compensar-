<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mente en Forma</title>
<script src="brand.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F8F7FF; --bg2:#F0EEF8; --card:#FFFFFF; --card2:#F4F2FC;
  --border:rgba(0,0,0,0.07); --border2:rgba(0,0,0,0.13);
  --text:#1A1830; --text2:#4A4468; --text3:#5C5880;
  --violet:#6C5CE7; --violet-d:rgba(108,92,231,0.10); --violet-b:rgba(108,92,231,0.25);
  --violet-deep:#534AB7;
  --teal:#0A7A6A; --teal-d:rgba(10,122,106,0.10); --teal-b:rgba(10,122,106,0.25);
  --gold:#C9A84C; --gold-l:rgba(201,168,76,0.12); --gold-b:rgba(201,168,76,0.30);
  --amber:#F5A623; --amber-d:rgba(245,166,35,0.12); --amber-b:rgba(245,166,35,0.28);
  --green:#52C98A; --green-d:rgba(82,201,138,0.12); --green-b:rgba(82,201,138,0.30);
  --coral:#E05C5C; --coral-d:rgba(224,92,92,0.12);
  --purple:#B8A9FF; --purple-d:rgba(184,169,255,0.12); --purple-b:rgba(184,169,255,0.28);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{display:none;}

/* ONBOARDING */
#onboarding{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;overflow-y:auto;}
#onboarding.hidden{display:none;}
.ob-screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:480px;animation:obUp 0.4s ease both;}
.ob-screen.active{display:flex;}
@keyframes obUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.ob-dots{display:flex;gap:6px;margin-bottom:36px;}
.ob-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:background 0.3s;}
.ob-dot.active{background:var(--violet);}
.ob-dot.done{background:var(--teal);}
.ob-logo{font-family:'Fredoka',sans-serif;font-size:28px;font-weight:600;color:var(--text);letter-spacing:-0.01em;margin-bottom:5px;}
.ob-logo em{color:var(--violet);font-style:italic;}
.ob-tagline{font-size:15px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);margin-bottom:44px;}
.ob-title{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,7vw,46px);font-weight:300;line-height:1.2;color:var(--text);text-align:center;margin-bottom:12px;}
.ob-title em{color:var(--violet);font-style:italic;}
.ob-sub{font-size:20px;color:var(--text2);text-align:center;line-height:1.75;margin-bottom:32px;max-width:400px;}
#ob-age::-webkit-inner-spin-button,#ob-age::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
.ob-input{width:100%;padding:16px 20px;background:var(--card);border:1.5px solid var(--border2);border-radius:12px;color:var(--text);font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;text-align:center;outline:none;transition:border-color 0.2s;margin-bottom:28px;-webkit-appearance:none;}
.ob-input::placeholder{color:var(--text3);}
.ob-input:focus{border-color:var(--violet);}
.ob-profiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:24px;}
.ob-profile{padding:20px 12px;border-radius:14px;border:1.5px solid var(--border2);background:var(--card);cursor:pointer;text-align:center;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
.ob-profile:hover,.ob-profile.selected{border-color:var(--violet);background:var(--violet-d);}
.op-emoji{font-size:28px;margin-bottom:8px;display:block;}
.op-ages{font-size:18px;font-weight:600;color:var(--text);line-height:1;}
.op-label{font-size:13px;color:var(--text3);margin-top:4px;letter-spacing:0.06em;text-transform:uppercase;}
.ob-profile.selected .op-ages,.ob-profile.selected .op-label{color:var(--violet);}
.ob-parent-note{width:100%;padding:12px 16px;border-radius:10px;background:var(--amber-d);border:1px solid rgba(245,166,35,0.2);font-size:13px;color:var(--amber);text-align:center;line-height:1.55;margin-bottom:20px;display:none;}
.ob-parent-note.show{display:block;}
.ob-confidence{display:flex;flex-direction:column;gap:10px;width:100%;margin-bottom:28px;}
.ob-conf-opt{padding:16px;border-radius:12px;border:1.5px solid var(--border2);background:var(--card);cursor:pointer;display:flex;align-items:center;gap:14px;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
.ob-conf-opt:hover,.ob-conf-opt.selected{border-color:var(--violet);background:var(--violet-d);}
.oc-emoji{font-size:22px;flex-shrink:0;}
.oc-label{font-size:17px;font-weight:600;color:var(--text);}
.oc-desc{font-size:16px;color:var(--text3);margin-top:2px;line-height:1.55;}
.ob-conf-opt.selected .oc-label{color:var(--violet);}
.ob-rec-card{width:100%;background:var(--card);border:1.5px solid var(--border2);border-radius:16px;overflow:hidden;margin-bottom:22px;}
.ob-rec-head{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.ob-rec-icon{font-size:24px;}
.ob-rec-label{font-size:15px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--violet);}
.ob-rec-name{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--text);margin-top:2px;}
.ob-rec-body{padding:15px 20px;}
.ob-rec-desc{font-size:16px;color:var(--text2);line-height:1.7;margin-bottom:12px;}
.ob-rec-tags{display:flex;gap:6px;flex-wrap:wrap;}
.ob-rec-tag{font-size:13px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:4px 11px;border-radius:20px;background:var(--bg2);color:var(--text3);border:1px solid var(--border2);}
.ob-greeting{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,5vw,34px);font-weight:300;color:var(--text);text-align:center;margin-bottom:8px;line-height:1.2;}
.ob-greeting em{color:var(--violet);font-style:italic;}
.ob-session-note{font-size:17px;color:var(--text3);text-align:center;margin-bottom:28px;}
.ob-btn{width:100%;padding:17px;background:var(--violet-deep);color:#fff;border:none;border-radius:13px;cursor:pointer;font-family:'Fredoka','DM Sans',sans-serif;font-size:19px;font-weight:600;letter-spacing:0.02em;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
.ob-btn:hover{background:var(--violet);transform:translateY(-1px);}
.ob-btn:disabled{opacity:0.3;pointer-events:none;transform:none;}
.ob-btn-ghost{width:100%;padding:13px;background:transparent;color:var(--text3);border:1.5px solid var(--border2);border-radius:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;margin-top:10px;transition:all 0.18s;-webkit-tap-highlight-color:transparent;}
.ob-btn-ghost:hover{color:var(--text2);}
.ob-back{font-size:17px;color:var(--text3);cursor:pointer;margin-top:16px;display:inline-flex;align-items:center;gap:5px;transition:color 0.15s;}
.ob-back:hover{color:var(--text2);}

/* MAIN APP */
#app{display:none;}
#app.show{display:block;}
.app-wrap{position:relative;z-index:10;max-width:480px;margin:0 auto;padding:0 20px 48px;display:flex;flex-direction:column;min-height:100vh;
}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:28px 0 0;}
.top-logo{font-family:'Fredoka',sans-serif;font-size:22px;font-weight:600;color:var(--text);letter-spacing:-0.01em;display:flex;align-items:center;gap:7px;white-space:nowrap;}
.top-logo em{color:var(--violet);font-style:italic;}
.top-right{display:flex;align-items:center;gap:14px;}
.streak-wrap{display:flex;align-items:center;gap:5px;cursor:default;}
.streak-fire{font-size:22px;line-height:1;filter:drop-shadow(0 0 5px rgba(255,140,0,0.5));transition:transform 0.2s;}
.streak-wrap:hover .streak-fire{transform:scale(1.2);}
.streak-wrap.zero .streak-fire{filter:none;opacity:0.25;}
.streak-count{font-family:'Fredoka',sans-serif;font-size:20px;font-weight:600;color:var(--amber);line-height:1;}
.streak-wrap.zero .streak-count{color:var(--text3);}
.top-settings{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:4px;-webkit-tap-highlight-color:transparent;transition:color 0.15s;}
.top-settings:hover{color:var(--text2);}

.greeting-block{padding:28px 0 20px;}
.greeting-hi{font-family:'Fredoka',sans-serif;font-size:clamp(40px,10vw,56px);font-weight:600;color:var(--text);line-height:1.1;margin-bottom:8px;}
.greeting-hi em{color:var(--violet);font-style:italic;}
.greeting-date{font-family:'Fredoka',sans-serif;font-size:17px;font-weight:400;color:var(--text3);letter-spacing:0.01em;}

/* ── Post-session state ── */
.done-block { display:none; flex-direction:column; margin-bottom:20px; }
.done-block.show { display:flex; }
.done-unified-card {
  background:var(--card); border:1.5px solid var(--teal-b);
  border-radius:16px; padding:20px 22px;
  display:flex; align-items:center; gap:14px;
}
.done-summary-icon {
  width:38px; height:38px; border-radius:50%; background:var(--teal-d);
  border:1.5px solid var(--teal-b); color:var(--teal);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:700; flex-shrink:0;
}
.done-summary-title { font-family:'Fredoka',sans-serif; font-size:18px; font-weight:600; color:var(--text); line-height:1.2; }
.done-summary-sub { font-size:17px; color:var(--text3); margin-top:3px; }
.done-tomorrow-sub { font-size:15px; color:var(--text3); opacity:0.7; }
.done-block.show{display:flex;}
.done-fire{font-size:60px;filter:drop-shadow(0 0 14px rgba(255,140,0,0.6));animation:firePop 0.5s ease both;margin-bottom:4px;}
@keyframes firePop{from{transform:scale(0.4);opacity:0}to{transform:scale(1);opacity:1}}
.done-msg{font-family:'Fredoka',sans-serif;font-size:28px;font-weight:600;color:var(--text);}
.done-sub{font-size:17px;color:var(--text2);line-height:1.65;max-width:300px;}

.main-cta{width:100%;padding:18px;margin-bottom:20px;background:var(--violet-deep);color:#fff;border:none;border-radius:16px;font-family:'Fredoka','DM Sans',sans-serif;font-size:22px;font-weight:600;cursor:pointer;transition:all 0.2s;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;gap:10px;}


.main-cta:hover{background:var(--violet);}
.main-cta:active{opacity:0.9;}
.main-cta:disabled{background:var(--card2);color:var(--text3);cursor:default;transform:none;}

.prog-bar-wrap{margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.prog-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--violet);border-radius:2px;transition:width 0.5s ease;}
.prog-label{font-size:16px;color:var(--text3);min-width:28px;text-align:right;}

.today-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.today-ex{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border:1px solid var(--border2);border-radius:12px;}
.today-ex.done{border-color:var(--teal-b);background:rgba(46,207,184,0.06);}
.today-ex-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all 0.2s;}
.today-ex.done .today-ex-check{background:var(--teal);border-color:var(--teal);color:#0C0C10;}
.today-ex-name{font-size:18px;font-weight:600;color:var(--text);flex:1;}
.today-ex.done .today-ex-name{color:var(--text3);}
.today-ex-pill{font-size:14px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:var(--violet-d);color:var(--violet);border:1px solid var(--violet-b);}
.today-ex.done .today-ex-pill{background:var(--teal-d);color:var(--teal);border-color:var(--teal-b);}

.explore-footer {
  width:100%; margin-top:8px;
}
.see-all-btn {
  width:100%; padding:16px 20px; border-radius:14px; cursor:pointer;
  background:var(--card); border:1.5px solid var(--border2);
  text-align:left; transition:all 0.15s;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
}
.see-all-btn:hover { border-color:var(--violet-b); background:var(--violet-d); }
.see-all-main { font-family:'Fredoka',sans-serif; font-size:18px; font-weight:600; color:var(--text); display:flex; align-items:center; justify-content:space-between; }
.see-all-sub { font-size:14px; color:var(--text3); margin-top:2px; }
.see-all-arrow { transition:transform 0.2s; color:var(--violet); font-size:18px; font-weight:700; }
.see-all-btn:hover .see-all-main { color:var(--violet); }
.see-all-btn.open .see-all-arrow{transform:rotate(180deg);}

.ex-grid-wrap{display:none;flex-direction:column;gap:24px;animation:fadeUp 0.3s ease both;}
.ex-grid-wrap.show{display:flex;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.pillar-title{font-size:14px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;margin-top:4px;display:flex;align-items:center;gap:10px;}
.pillar-title::after{content:'';flex:1;height:1px;background:var(--border);}
.ex-thumb-grid .ex-thumb:last-child:nth-child(odd){grid-column:1/-1;max-width:calc(50% - 5px);}
.ex-grid{display:flex;flex-direction:column;gap:8px;}

/* ── Exercise thumbnail grid ── */
.ex-thumb-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ex-thumb{background:var(--card);border:1px solid var(--border2);border-radius:14px;
  padding:16px 14px;text-decoration:none;display:flex;flex-direction:column;
  align-items:center;gap:8px;text-align:center;transition:all 0.18s;
  -webkit-tap-highlight-color:transparent;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.ex-thumb:hover,.ex-thumb:active{border-color:var(--violet-b);background:var(--violet-d);}
.ex-thumb-icon{font-size:28px;line-height:1;}
.ex-thumb-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;}

.ex-card{background:var(--card);border:1px solid var(--border2);border-radius:13px;padding:16px 18px;text-decoration:none;display:flex;align-items:center;gap:14px;transition:all 0.18s;-webkit-tap-highlight-color:transparent;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.ex-card:hover,.ex-card:active{border-color:var(--violet-b);background:var(--violet-d);}
.ex-card.recommended{border-color:rgba(201,168,76,0.35);}
.ex-card-text{flex:1;}
.ex-name{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px;}
.ex-desc{font-size:16px;color:var(--text3);line-height:1.5;}
.ex-arrow{font-size:16px;color:var(--text3);}
.ex-card:hover .ex-arrow{color:var(--violet);}

.session-complete-overlay{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;animation:scFadeIn 0.4s ease both;}
@keyframes scFadeIn{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}
.session-complete-overlay.hidden{display:none;}
</style>
</head>
<body>

<!-- ONBOARDING (3 screens: nombre → edad → saludo) -->
<div id="onboarding">
  <div class="ob-screen active" id="ob-s1">
    <div class="ob-logo" id="brand-logo"></div>
    <div class="ob-tagline" id="brand-tagline"></div>
    <div class="ob-dots"><div class="ob-dot active"></div><div class="ob-dot"></div><div class="ob-dot"></div></div>
    <div class="ob-title" id="ob-s1-title"></div>
    <div class="ob-sub" id="ob-s1-sub"></div>
    <input class="ob-input" id="ob-name" type="text" placeholder="" autocomplete="given-name" maxlength="30" oninput="checkName()">
    <button class="ob-btn" id="ob-s1-btn" disabled onclick="goTo(2)">Continuar →</button>
  </div>
  <div class="ob-screen" id="ob-s2">
    <div class="ob-dots"><div class="ob-dot done"></div><div class="ob-dot active"></div><div class="ob-dot"></div></div>
    <div class="ob-title" id="ob-s2-title"></div>
    <div class="ob-sub" id="ob-s2-sub"></div>
    <div style="width:100%;display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:28px;">
      <input id="ob-age" type="number" min="18" max="100" placeholder="Ej. 62"
        style="width:100%;padding:18px 20px;font-family:'Cormorant Garamond',serif;font-size:36px;
        font-weight:300;text-align:center;background:var(--card);border:1.5px solid var(--border2);
        border-radius:14px;color:var(--text);outline:none;-webkit-tap-highlight-color:transparent;
        -webkit-appearance:none;-moz-appearance:textfield;appearance:textfield;"
        oninput="checkAge()" inputmode="numeric">
    </div>
    <button class="ob-btn" id="ob-s2-btn" disabled onclick="goTo(3)">Continuar →</button>
    <span class="ob-back" onclick="goTo(1)">← Atrás</span>
  </div>
  <div class="ob-screen" id="ob-s3">
    <div class="ob-dots"><div class="ob-dot done"></div><div class="ob-dot done"></div><div class="ob-dot active"></div></div>
    <div class="ob-greeting" id="ob-rec-greeting"></div>
    <div class="ob-session-note" id="ob-session-note"></div>
    <div class="ob-rec-card">
      <div class="ob-rec-body" style="padding:22px 20px;">
        <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--text);line-height:1.4;margin-bottom:10px;" id="ob-s3-cardtext"></div>
        <div style="font-size:17px;color:var(--text2);line-height:1.7;" id="ob-s3-closing"></div>
      </div>
    </div>
    <button class="ob-btn" id="ob-start-btn"></button>
    <button class="ob-btn-ghost" id="ob-explore-btn"></button>
    <span class="ob-back" onclick="goTo(2)">← Atrás</span>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
<div class="app-wrap">
  <div class="top-bar">
    <div class="top-logo">
      <svg width="20" height="24" viewBox="0 0 22 26" fill="none" style="flex-shrink:0;">
        <rect x="1.5" y="1.5" width="19" height="14" rx="7" stroke="var(--violet)" stroke-width="1.8"/>
        <path d="M1.5 11 Q1.5 19 11 19 Q20.5 19 20.5 11" stroke="var(--violet)" stroke-width="1.8" stroke-linecap="round" fill="none"/>
        <path d="M5 7 Q11 2 17 7" stroke="var(--teal)" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
      <span style="letter-spacing:-0.02em;" id="brand-logo-top"></span>
    </div>
    <div class="top-right">
      <div class="streak-wrap zero" id="streak-wrap">
        <span class="streak-fire">🔥</span>
        <span class="streak-count" id="streak-count">0</span>
      </div>
      <button class="top-settings" onclick="resetOnboarding()" title="Cambiar perfil">⚙</button>
    </div>
  </div>

  <div class="greeting-block">
    <div class="greeting-hi">Hola, <em id="greeting-name" style="color:var(--violet);font-style:normal;"></em></div>
    <div class="greeting-date" id="greeting-date"></div>
  </div>

  <div class="done-block" id="done-block">
    <div class="done-unified-card">
      <span class="done-summary-icon">✓</span>
      <div>
        <div class="done-summary-title" id="done-msg">¡Sesión completada!</div>
        <div class="done-summary-sub" id="done-sub"></div>
      </div>
    </div>
  </div>

  <div class="prog-bar-wrap" id="prog-wrap" style="display:none;">
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-label" id="prog-label">0/0</div>
  </div>

  <div id="session-label" style="font-size:14px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;">Tu sesión de hoy</div>
  <div class="today-list" id="today-list"></div>

  <button class="main-cta" id="main-cta" onclick="startDailySession()">
    <span style="font-size:16px;line-height:1;">▶</span><span id="cta-label">Comenzar sesión</span>
  </button>

  <div class="explore-footer" id="explore-footer">
    <button class="see-all-btn" id="see-all-btn" onclick="toggleExGrid()">
      <div class="see-all-main">Explorar ejercicios&nbsp;<span class="see-all-arrow">↓</span></div>
      <div class="see-all-sub">Practica cuando quieras</div>
    </button>
  </div>
  <div class="ex-grid-wrap" id="ex-grid-wrap">
    <div>
      <div class="pillar-title" style="color:var(--teal);">Lectura Visual</div>
      <div class="ex-thumb-grid">
        <a class="ex-thumb" id="card-flash" href="lectura_flash_rsvp.html"><div class="ex-thumb-icon">⚡</div><div class="ex-thumb-name">Lectura Flash</div></a>
        <a class="ex-thumb" id="card-bloques" href="lectura_por_bloques_prototype.html"><div class="ex-thumb-icon">📦</div><div class="ex-thumb-name">Lectura por Bloques</div></a>
        <a class="ex-thumb" id="card-contra" href="contrarreloj.html"><div class="ex-thumb-icon">📖</div><div class="ex-thumb-name">Lectura Adaptativa</div></a>
        <a class="ex-thumb" id="card-vision" href="vision_paralela.html"><div class="ex-thumb-icon">👁</div><div class="ex-thumb-name">Visión Paralela</div></a>
        <a class="ex-thumb" id="card-saltos" href="saltos_visuales.html"><div class="ex-thumb-icon">⇄</div><div class="ex-thumb-name">Saltos Visuales</div></a>
      </div>
    </div>
    <div>
      <div class="pillar-title" style="color:var(--violet);">Memoria Activa</div>
      <div class="ex-thumb-grid">
        <a class="ex-thumb" id="card-memoria" href="memoria_activa.html"><div class="ex-thumb-icon">🧠</div><div class="ex-thumb-name">Memoria Activa</div></a>
        <a class="ex-thumb" id="card-cats" href="actualizacion_categorias.html"><div class="ex-thumb-icon">🗂</div><div class="ex-thumb-name">Act. Categorías</div></a>
        <a class="ex-thumb" id="card-continua" href="actualizacion_continua.html"><div class="ex-thumb-icon">🔄</div><div class="ex-thumb-name">Act. Continua</div></a>
      </div>
    </div>
    <div style="padding:4px 0 8px;">
      <button class="ob-back" onclick="resetOnboarding()" style="margin:0;font-size:15px;">⚙ Cambiar perfil</button>
    </div>
  </div>
</div>
</div>


<script>
const EXERCISES = {
  flash:    { name:'Lectura Flash',        url:'lectura_flash_rsvp.html' },
  bloques:  { name:'Lectura por Bloques',   url:'lectura_por_bloques_prototype.html' },
  contra:   { name:'Lectura Adaptativa',    url:'contrarreloj.html' },
  vision:   { name:'Visión Paralela',       url:'vision_paralela.html' },
  saltos:   { name:'Saltos Visuales',       url:'saltos_visuales.html' },
  memoria:  { name:'Memoria Activa',        url:'memoria_activa.html' },
  cats:     { name:'Act. Categorías',       url:'actualizacion_categorias.html' },
  continua: { name:'Act. Continua',         url:'actualizacion_continua.html' },
};

// Warm-up trio for first-time users, driven by brand.js so a future
// white-label client can reorder/swap it without touching this file.
const FIRST_SESSION = BRAND.firstSession.map(key => ({ key, url: EXERCISES[key].url }));

const SCHEDULE = {
  adult:  [['flash','cats','saltos'],['flash','cats','saltos'],['contra','memoria','vision'],['flash','continua','bloques'],['contra','cats','saltos'],['flash','memoria','vision'],['continua','bloques','saltos']],
  teen:   [['flash','cats','saltos'],['flash','cats','saltos'],['contra','memoria','vision'],['flash','continua','bloques'],['contra','cats','saltos'],['flash','memoria','vision'],['continua','bloques','saltos']],
  child:  [['cats','saltos'],['flash','cats'],['cats','saltos'],['flash','cats'],['cats','saltos'],['flash','cats'],['cats','saltos']],
  senior: [['flash','cats','saltos'],['flash','cats','saltos'],['contra','cats','vision'],['flash','saltos','bloques'],['contra','cats','saltos'],['flash','cats','vision'],['saltos','bloques','cats']],
};

const RECS = {
  child: {
    beginner:     {icon:'🌱',name:'Act. Categorías',  url:'actualizacion_categorias.html',id:'card-cats',   desc:'Empezamos con el juego de categorías — el más sencillo y divertido. Mira palabras, recuerda la última de cada tipo.',tags:['Fácil','Sin tiempo límite']},
    intermediate: {icon:'⚡',name:'Act. Categorías',  url:'actualizacion_categorias.html',id:'card-cats',   desc:'Comenzamos con el ejercicio de categorías en nivel normal. Observa la secuencia y recuerda la última palabra de cada grupo.',tags:['Normal','Memoria']},
    advanced:     {icon:'🎯',name:'Lectura Flash',     url:'lectura_flash_rsvp.html',      id:'card-flash',  desc:'Empezamos con Lectura Flash en modo suave — verás palabras una a una y responderás preguntas sobre el texto.',tags:['150 ppm','Texto fácil']},
  },
  teen: {
    beginner:     {icon:'📖',name:'Lectura Flash',     url:'lectura_flash_rsvp.html',      id:'card-flash',  desc:'Comenzamos con Lectura Flash al ritmo más cómodo — texto sencillo, velocidad baja.',tags:['150 ppm','Sin presión']},
    intermediate: {icon:'🚀',name:'Lectura Flash',     url:'lectura_flash_rsvp.html',      id:'card-flash',  desc:'Lectura Flash en nivel estándar — buen punto de partida para mejorar tu velocidad con control de comprensión.',tags:['200 ppm','Adaptativo']},
    advanced:     {icon:'⚡',name:'Act. Continua',     url:'actualizacion_continua.html',  id:'card-continua',desc:'Para lectores avanzados, el n-back entrena la memoria de trabajo que marca la diferencia en lectura compleja.',tags:['1-back visual','Desafiante']},
  },
  adult: {
    beginner:     {icon:'📖',name:'Lectura Adaptativa',  url:'contrarreloj.html',            id:'card-contra', desc:'Comenzamos con una calibración breve de tu velocidad natural, luego el texto se desvanece gradualmente.',tags:['Calibración propia','RAP']},
    intermediate: {icon:'🎯',name:'Lectura Flash',     url:'lectura_flash_rsvp.html',      id:'card-flash',  desc:'Lectura Flash es el punto de entrada más efectivo — te calibras tú mismo y ves resultados desde la primera sesión.',tags:['200 ppm','Adaptativo']},
    advanced:     {icon:'🧠',name:'Act. Continua',     url:'actualizacion_continua.html',  id:'card-continua',desc:'El n-back visual entrena la capacidad que más distingue a los lectores expertos de los normales.',tags:['2-back','Inteligencia fluida']},
  },
  senior: {
    beginner:     {icon:'🌿',name:'Act. Categorías',  url:'actualizacion_categorias.html',id:'card-cats',   desc:'Empezamos con el ejercicio más accesible — sin presión de tiempo, texto claro, pausas a tu ritmo.',tags:['Sin tiempo límite','Ritmo propio']},
    intermediate: {icon:'📖',name:'Lectura Flash',     url:'lectura_flash_rsvp.html',      id:'card-flash',  desc:'Lectura Flash con el texto más sencillo y la velocidad más baja — excelente para mantener la agilidad lectora.',tags:['150 ppm','Texto fácil']},
    advanced:     {icon:'🎯',name:'Visión Paralela',   url:'vision_paralela.html',         id:'card-vision', desc:'La amplitud visual es uno de los predictores más sensibles de salud cognitiva.',tags:['VAS','Neuroplasticidad']},
  },
};

function TODAY_KEY(){ return new Date().toISOString().slice(0,10); }
function getUser(){ try{return JSON.parse(localStorage.getItem('em_user'))||null;}catch(e){return null;} }
function getStreak(){ try{return JSON.parse(localStorage.getItem('em_streak'))||{count:0,lastDate:''};}catch(e){return{count:0,lastDate:''};} }
function saveStreak(s){ try{localStorage.setItem('em_streak',JSON.stringify(s));}catch(e){} }
function getCompletions(){ try{return JSON.parse(localStorage.getItem('em_completions'))||{};}catch(e){return{};} }
function getTodayCompletions(){ return getCompletions()[TODAY_KEY()]||[]; }

function buildHomeScreen(){
  const data=getUser(); if(!data)return;
  document.getElementById('greeting-name').textContent=data.name||'';
  const now=new Date();
  const days=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('greeting-date').textContent=days[now.getDay()]+', '+now.getDate()+' de '+months[now.getMonth()];
  const streak=getStreak();
  document.getElementById('streak-count').textContent=streak.count;
  document.getElementById('streak-wrap').classList.toggle('zero',streak.count===0);
  const schedule=SCHEDULE[data.profile||'adult']||SCHEDULE.adult;
  const todayKeys=schedule[now.getDay()];
  const done=getTodayCompletions();
  const doneCount=todayKeys.filter(k=>done.includes(k)).length;
  const allDone=doneCount===todayKeys.length;
  if(doneCount>0&&!allDone){
    const pw=document.getElementById('prog-wrap'); pw.style.display='flex';
    document.getElementById('prog-fill').style.width=Math.round(doneCount/todayKeys.length*100)+'%';
    document.getElementById('prog-label').textContent=doneCount+'/'+todayKeys.length;
  }
  const list=document.getElementById('today-list'); list.innerHTML='';
  todayKeys.forEach(key=>{
    const ex=EXERCISES[key]; const isDone=done.includes(key);
    const div=document.createElement('div'); div.className='today-ex'+(isDone?' done':'');
    const check=document.createElement('div'); check.className='today-ex-check'; if(isDone)check.textContent='✓';
    const name=document.createElement('div'); name.className='today-ex-name'; name.textContent=ex?ex.name:key;
    const pill=document.createElement('div'); pill.className='today-ex-pill'; pill.textContent=isDone?'Hecho':'~5 min';
    if(!isDone && ex){
      div.style.cursor='pointer';
      div.style.transition='all 0.15s';
      div.addEventListener('click',()=>{ window.location.href=ex.url+'?session=1'; });
      div.addEventListener('mouseenter',()=>{ div.style.borderColor='var(--violet-b)'; div.style.background='var(--violet-d)'; });
      div.addEventListener('mouseleave',()=>{ div.style.borderColor=''; div.style.background=''; });
      // Add a small arrow to signal it's tappable
      const arrow=document.createElement('span');
      arrow.textContent='›';
      arrow.style.cssText='font-size:22px;color:var(--text3);margin-left:4px;line-height:1;';
      div.appendChild(check); div.appendChild(name); div.appendChild(pill); div.appendChild(arrow);
    } else {
      div.appendChild(check); div.appendChild(name); div.appendChild(pill);
    }
    list.appendChild(div);
  });
  const cta=document.getElementById('main-cta');
  if(allDone){
    cta.style.display='none';
    document.getElementById('session-label').style.display='none';

    document.getElementById('done-block').classList.add('show');
    document.getElementById('prog-wrap').style.display='none';
    list.style.display='none';
    // Streak message
    const s=getStreak();
    let msg,sub;
    if(s.count>=7){msg='🔥 '+s.count+' días seguidos';sub='Eso es disciplina real.';}
    else if(s.count>=3){msg='🔥 '+s.count+' días seguidos';sub='La constancia es el entrenamiento más poderoso.';}
    else if(s.count===1){msg='Primera sesión completada';sub='El primer paso es el más importante.';}
    else{msg='Sesión completada';sub='Excelente trabajo hoy.';}
    document.getElementById('done-msg').textContent=msg;
    document.getElementById('done-sub').textContent=sub;

  } else if(doneCount>0){
    document.getElementById('cta-label').textContent='Continuar sesión';
  }
  const rec=(RECS[data.profile||'adult']||RECS.adult)[data.conf||'intermediate']||RECS.adult.intermediate;
  const card=document.getElementById(rec.id); if(card)card.classList.add('recommended');
}

function toggleExGrid(){
  const wrap=document.getElementById('ex-grid-wrap');
  const btn=document.getElementById('see-all-btn');
  const open=wrap.classList.toggle('show');
  btn.classList.toggle('open',open);
  if(open)setTimeout(()=>wrap.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function isFirstSession(){
  // First session if user has never completed any exercise
  try{
    const all=JSON.parse(localStorage.getItem('em_completions')||'{}');
    return Object.keys(all).length===0;
  }catch(e){ return true; }
}

function startDailySession(){
  const data=getUser(); if(!data)return;

  if(isFirstSession()){
    const done=getTodayCompletions();
    const remaining=FIRST_SESSION.filter(e=>!done.includes(e.key));
    if(remaining.length===0)return;
    const queue={keys:FIRST_SESSION.map(e=>e.key),date:TODAY_KEY(),profile:data.profile||'adult'};
    try{localStorage.setItem('em_session_queue',JSON.stringify(queue));}catch(e){}
    window.location.href=remaining[0].url+'?session=1&first=1';
    return;
  }

  const dow=new Date().getDay();
  const schedule=SCHEDULE[data.profile||'adult']||SCHEDULE.adult;
  const sessionKeys=schedule[dow];
  const done=getTodayCompletions();
  const remaining=sessionKeys.filter(k=>!done.includes(k));
  if(remaining.length===0)return;
  const queue={keys:sessionKeys,date:TODAY_KEY(),profile:data.profile||'adult'};
  try{localStorage.setItem('em_session_queue',JSON.stringify(queue));}catch(e){}
  const nextEx=EXERCISES[remaining[0]];
  if(nextEx)window.location.href=nextEx.url+'?session=1';
}

function checkReturnCompletion(){
  const params=new URLSearchParams(window.location.search);
  const done=params.get('done');
  window.history.replaceState({},'',window.location.pathname);
  if(done==='session'){ showSessionCompleteOverlay(); return; }
  if(done){
    const all=getCompletions(); const today=TODAY_KEY();
    if(!all[today])all[today]=[];
    if(!all[today].includes(done))all[today].push(done);
    try{localStorage.setItem('em_completions',JSON.stringify(all));}catch(e){}
    const streak=getStreak();
    if(streak.lastDate!==today){
      const yesterday=new Date(); yesterday.setDate(yesterday.getDate()-1);
      const yKey=yesterday.toISOString().slice(0,10);
      saveStreak({count:streak.lastDate===yKey?streak.count+1:1,lastDate:today});
    }
  }
}

function showSessionCompleteOverlay(){
  // Update streak
  const today=TODAY_KEY();
  const streak=getStreak();
  if(streak.lastDate!==today){
    const yesterday=new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yKey=yesterday.toISOString().slice(0,10);
    saveStreak({count:streak.lastDate===yKey?streak.count+1:1,lastDate:today});
  }
  // Go straight to home — buildHomeScreen handles the done state cleanly
  buildHomeScreen();
}

function applyBrand(){
  document.title = BRAND.name;
  const logo=document.getElementById('brand-logo'); if(logo) logo.innerHTML=BRAND.logoHTML;
  const logoTop=document.getElementById('brand-logo-top'); if(logoTop) logoTop.innerHTML=BRAND.logoHTML;
  const tagline=document.getElementById('brand-tagline'); if(tagline) tagline.textContent=BRAND.tagline;

  const ob=BRAND.onboarding;
  document.getElementById('ob-s1-title').innerHTML=ob.s1.title;
  document.getElementById('ob-s1-sub').textContent=ob.s1.sub;
  document.getElementById('ob-name').placeholder=ob.s1.placeholder;

  document.getElementById('ob-s2-title').innerHTML=ob.s2.title;
  document.getElementById('ob-s2-sub').textContent=ob.s2.sub;
  const ageEl=document.getElementById('ob-age');
  if(ageEl){ ageEl.min=BRAND.minAge; ageEl.max=BRAND.maxAge; }

  document.getElementById('ob-session-note').textContent=ob.s3.sessionNote;
  document.getElementById('ob-s3-cardtext').textContent=ob.s3.cardText;
  document.getElementById('ob-s3-closing').textContent=ob.s3.closingLine;
  document.getElementById('ob-start-btn').textContent=ob.s3.startBtn;
  document.getElementById('ob-explore-btn').textContent=ob.s3.exploreBtn;
  document.getElementById('ob-start-btn').onclick=()=>finishOnboarding(true);
  document.getElementById('ob-explore-btn').onclick=()=>goToExplore();
}

function goTo(n){
  document.querySelectorAll('.ob-screen').forEach(s=>s.classList.remove('active'));
  const s=document.getElementById('ob-s'+n); if(s)s.classList.add('active');
  if(n===2) setupAgeScreen();
  if(n===3) setupGreetingScreen();
}
function checkName(){ document.getElementById('ob-s1-btn').disabled=document.getElementById('ob-name').value.trim().length<1; }
function setupAgeScreen(){
  document.getElementById('ob-s2-btn').disabled = true;
  const ageEl = document.getElementById('ob-age');
  if(ageEl) ageEl.value = '';
}
function checkAge(){
  const v = parseInt(document.getElementById('ob-age').value);
  document.getElementById('ob-s2-btn').disabled = !(v >= BRAND.minAge && v <= BRAND.maxAge);
}
function setupGreetingScreen(){
  const name=document.getElementById('ob-name').value.trim();
  document.getElementById('ob-rec-greeting').innerHTML='Todo listo, <em>'+name+'</em>.';
}
function finishOnboarding(launchExercise){
  const name=document.getElementById('ob-name').value.trim();
  const age=parseInt(document.getElementById('ob-age')?.value)||60;
  const profile=BRAND.profileFromAge(age);
  const data={name,profile,age,since:new Date().toLocaleDateString('es-CO',{day:'numeric',month:'long'})};
  try{localStorage.setItem('em_user',JSON.stringify(data));}catch(e){}
  if(launchExercise){
    const queue={keys:FIRST_SESSION.map(e=>e.key),date:TODAY_KEY(),profile};
    try{localStorage.setItem('em_session_queue',JSON.stringify(queue));}catch(e){}
    window.location.href=FIRST_SESSION[0].url+'?session=1&first=1';
  } else {
    document.getElementById('onboarding').classList.add('hidden');
    document.getElementById('app').classList.add('show');
    buildHomeScreen();
  }
}
function goToExplore(){
  const name=document.getElementById('ob-name')?.value.trim()||'';
  const age=parseInt(document.getElementById('ob-age')?.value)||60;
  if(name){
    const data={name,profile:BRAND.profileFromAge(age),age,since:new Date().toLocaleDateString('es-CO',{day:'numeric',month:'long'})};
    try{localStorage.setItem('em_user',JSON.stringify(data));}catch(e){}
  }
  document.getElementById('onboarding').classList.add('hidden');
  document.getElementById('app').classList.add('show');
  buildHomeScreen();
  setTimeout(()=>{
    // Hide entire session section
    ['session-label','today-list','main-cta','prog-wrap'].forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.style.display='none';
    });
    // Open exercise grid directly
    const wrap=document.getElementById('ex-grid-wrap');
    if(wrap) wrap.classList.add('show');
    const btn=document.getElementById('see-all-btn');
    if(btn) btn.classList.add('open');
    // Scroll to grid
    const footer=document.getElementById('explore-footer');
    if(footer) footer.scrollIntoView({behavior:'smooth',block:'start'});
  }, 100);
}

// ─────────────────────────────────────────────
// Age-based reading speed baseline
// Based on normative reading speed research
// ─────────────────────────────────────────────
function getBaseWpm(age) {
  age = age || 60;
  if (age < 30) return 250;
  if (age < 40) return 230;
  if (age < 50) return 210;
  if (age < 60) return 185;
  if (age < 70) return 160;
  if (age < 80) return 140;
  return 120;
}

function getUserAge() {
  try { return parseInt(JSON.parse(localStorage.getItem('em_user')||'{}').age)||60; } catch(e){ return 60; }
}

function resetOnboarding(){
  if(!confirm('¿Cambiar el perfil de usuario? Esto reiniciará la configuración.'))return;
  ['em_user','em_completions','em_streak','em_session_queue'].forEach(k=>{try{localStorage.removeItem(k);}catch(e){}});
  location.reload();
}

function init(){
  applyBrand();
  checkReturnCompletion();
  const data=getUser();
  if(data){
    document.getElementById('onboarding').classList.add('hidden');
    document.getElementById('app').classList.add('show');
    buildHomeScreen();
  }
}

document.getElementById('ob-name').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!document.getElementById('ob-s1-btn').disabled)goTo(2);
});

init();
</script>
